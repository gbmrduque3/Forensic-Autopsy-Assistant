<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forense Assistant – Acceso</title>
  <meta name="description"
    content="Plataforma forense de asistencia en autopsias. Inicia sesión para acceder al sistema." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/styles/main.css" />
  <style>
    .login-wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-container {
      width: 100%;
      max-width: 440px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-header .icon {
      font-size: 3rem;
      margin-bottom: 12px;
      display: block;
      filter: drop-shadow(0 0 12px rgba(0, 200, 255, 0.5));
    }

    .login-header h1 {
      font-size: 1.3rem;
      color: var(--text-secondary);
      font-weight: 400;
      margin-top: 8px;
    }

    .tabs {
      display: flex;
      gap: 2px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .tab-btn.active {
      background: rgba(6, 182, 212, 0.1);
      color: var(--accent-cyan);
    }

    .form-panel {
      display: none;
    }

    .form-panel.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    .form-body {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card-body {
      padding: 32px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .submit-btn {
      width: 100%;
      justify-content: center;
      padding: 14px;
      font-size: 1rem;
      margin-top: 4px;
    }

    .role-info {
      background: rgba(0, 200, 255, 0.06);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 0.82rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .role-info strong {
      color: var(--accent-cyan);
    }

    .footer-note {
      text-align: center;
      margin-top: 20px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .password-wrapper input {
      padding-right: 40px;
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0;
      display: flex;
    }

    .password-toggle:hover {
      color: var(--text-secondary);
    }
  </style>
</head>

<body>
  <div class="login-wrapper">
    <div class="login-container fade-in">
      <!-- Header -->
      <div class="login-header">
        <span class="icon" style="filter: drop-shadow(0 0 12px rgba(6, 182, 212, 0.4))">🔬</span>
        <span class="logo-text" style="font-size:1.6rem; color: var(--accent-cyan)">FORENSE ASSISTANT</span>
        <h1>Instituto de Medicina Legal y Ciencias Forenses</h1>
      </div>

      <!-- Card -->
      <div class="glass-card">
        <div class="card-body">
          <!-- Tabs -->
          <div class="tabs" role="tablist">
            <button class="tab-btn active" id="tab-login" onclick="switchTab('login')" role="tab">Iniciar
              Sesión</button>
            <button class="tab-btn" id="tab-register" onclick="switchTab('register')" role="tab">Registrarse</button>
          </div>

          <!-- Alert -->
          <div class="alert" id="auth-alert"></div>

          <!-- LOGIN FORM -->
          <form class="form-panel active" id="panel-login" onsubmit="event.preventDefault(); doLogin();">
            <div class="form-body">
              <div class="form-group">
                <label class="form-label" for="login-username">Nombre de usuario</label>
                <input class="form-control" id="login-username" type="text" placeholder="dr_pepe"
                  autocomplete="username" />
              </div>
              <div class="form-group">
                <label class="form-label" for="login-password">Contraseña</label>
                <div class="password-wrapper">
                  <input class="form-control" id="login-password" type="password" placeholder="••••••••"
                    autocomplete="current-password" />
                  <button type="button" class="password-toggle"
                    onclick="togglePassword('login-password', this)">👁️</button>
                </div>
              </div>
              <button class="btn btn-primary submit-btn" id="btn-login" type="submit">
                <span>🔐</span> Ingresar al Sistema
              </button>
              <div class="divider">o</div>
              <div class="role-info">
                <strong>Acceso Especial:</strong> Use las credenciales configuradas en <code>config.js</code>
              </div>
            </div>
          </form>

          <!-- REGISTER FORM -->
          <form class="form-panel" id="panel-register" onsubmit="event.preventDefault(); doRegister();">
            <div class="form-body">
              <div class="form-group">
                <label class="form-label" for="reg-name">Nombre completo</label>
                <input class="form-control" id="reg-name" type="text" placeholder="Dr. Juan Pérez" />
              </div>
              <div class="form-group">
                <label class="form-label" for="reg-username">Nombre de usuario</label>
                <input class="form-control" id="reg-username" type="text" placeholder="dr_pepe" />
              </div>
              <div class="form-group">
                <label class="form-label" for="reg-password">Contraseña</label>
                <div class="password-wrapper">
                  <input class="form-control" id="reg-password" type="password" placeholder="Mínimo 6 caracteres" />
                  <button type="button" class="password-toggle"
                    onclick="togglePassword('reg-password', this)">👁️</button>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label" for="reg-role">Rol</label>
                <select class="form-control" id="reg-role">
                  <option value="student">Estudiante</option>
                  <option value="professional">Profesional</option>
                </select>
              </div>
              <button class="btn btn-primary submit-btn" id="btn-register" type="submit">
                <span>✅</span> Crear Cuenta
              </button>
            </div>
          </form>
        </div>
      </div>

      <p class="footer-note">Sistema seguro · Datos almacenados localmente en este dispositivo</p>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/static/config.js"></script>
  <script src="/static/modules/auth.js"></script>
  <script>
    // Update institution name from config
    document.querySelector('.login-header h1').textContent =
      window.APP_CONFIG.institution;

    // If already logged in, redirect
    if (Auth.getCurrentUser()) {
      window.location.href = 'dashboard';
    }

    function switchTab(tab) {
      document.getElementById('panel-login').classList.toggle('active', tab === 'login');
      document.getElementById('panel-register').classList.toggle('active', tab === 'register');
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      hideAlert();
    }

    function showAlert(msg, type = 'error') {
      const el = document.getElementById('auth-alert');
      el.textContent = msg;
      el.className = `alert alert-${type} show`;
    }

    function hideAlert() {
      document.getElementById('auth-alert').className = 'alert';
    }

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁️';
      }
    }

    async function doLogin() {
      const username = document.getElementById('login-username').value.trim();
      const pass = document.getElementById('login-password').value;
      if (!username || !pass) { showAlert('Completa todos los campos.'); return; }
      const res = await Auth.login(username, pass);
      if (res.ok) {
        window.location.href = 'dashboard';
      } else {
        showAlert(res.error);
      }
    }

    async function doRegister() {
      const name = document.getElementById('reg-name').value.trim();
      const username = document.getElementById('reg-username').value.trim();
      const pass = document.getElementById('reg-password').value;
      const role = document.getElementById('reg-role').value;
      if (!name || !username || !pass) { showAlert('Completa todos los campos.'); return; }
      if (pass.length < 6) { showAlert('La contraseña debe tener al menos 6 caracteres.'); return; }
      const res = await Auth.register({ name, username, password: pass, role });
      if (res.ok) {
        showAlert('Cuenta creada. Ahora puedes iniciar sesión.', 'success');
        setTimeout(() => switchTab('login'), 1500);
      } else {
        showAlert(res.error);
      }
    }

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const active = document.querySelector('.form-panel.active').id;
        if (active === 'panel-login') doLogin();
        else doRegister();
      }
    });
  </script>
</body>

</html>
